model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

web_search = "live"

sandbox_permissions=["disk-full-read-access"]

[sandbox_workspace_write]
writable_roots = ["/home/drew/.cache", "/home/drew/.local"]

[projects."/home/drew/dirac/buildos-web"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web2"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web1"]
trust_level = "trusted"

[projects."/home/drew/nixconf"]
trust_level = "trusted"

[projects."/home/drew/dirac/aperture"]
trust_level = "trusted"

[projects."/home/drew/dirac"]
trust_level = "trusted"

[projects."/home/drew/dirac/cadex-scrape"]
trust_level = "trusted"

[projects."/home/drew/.codex"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web-zap-marshal-protobuf"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web-test-models-upload"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web-remove-image-unit-tests"]
trust_level = "trusted"

[features]
view_image_tool = true   # let Codex attach local images (paths in your workspace) to the model request

rmcp_client = true

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"

