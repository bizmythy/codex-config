model = "gpt-5.1-codex"
model_reasoning_effort = "medium"

writable_roots = ["/home/drew/.cache", "/home/drew/.local"]

[projects."/home/drew/dirac/buildos-web"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web2"]
trust_level = "trusted"

[projects."/home/drew/dirac/buildos-web1"]
trust_level = "trusted"

[projects."/home/drew/nixconf"]
trust_level = "trusted"

[projects."/home/drew/dirac/aperture"]
trust_level = "trusted"

[projects."/home/drew/dirac"]
trust_level = "trusted"

[features]
web_search_request = true   # allow Codex to issue first-party web searches without prompting you
view_image_tool = true   # let Codex attach local images (paths in your workspace) to the model request

experimental_use_rmcp_client = true

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[notice]
hide_gpt5_1_migration_prompt = true

